<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verdict IDE</title>
    <meta name="description" content="An intelligent editor for the Verdict language — live types, diagnostics, and inline results." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Keep first paint local/instant: avoid render-blocking external font fetches. -->
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body class="bg-[#0b0f1a]">
    <div id="app"></div>
    <!--
      Load the editor (Monaco + the Verdict compiler/VM — by far the heaviest
      code in the app) ONLY on the /editor route, and only the first time it's
      reached. Other pages (e.g. the landing page) ship none of it. The import
      defines the <verdict-editor> custom element; any already-rendered instance
      upgrades automatically once it's defined.
    -->
    <script type="module">
      let loaded = false;
      let loadingPromise = null;
      let loaderEl = null;
      let loaderTimer = null;

      const isEditorRoute = () => {
        const path = location.pathname.replace(/\/+$/, "");
        return path === "/editor" || path.startsWith("/editor/");
      };

      const ensureLoader = () => {
        if (loaderEl) return loaderEl;
        const el = document.createElement("div");
        el.setAttribute("data-editor-loader", "1");
        el.style.cssText = [
          "position:fixed",
          "inset:0",
          "display:none",
          "align-items:center",
          "justify-content:center",
          "background:#0b0f1a",
          "z-index:9999",
          "pointer-events:none",
        ].join(";");
        el.innerHTML = `
          <div style="width:min(520px,85vw);padding:20px;">
            <div style="color:#94a3b8;font:700 11px/1.2 Inter,sans-serif;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;">
              Loading Editor
            </div>
            <div style="height:8px;border-radius:999px;background:#1e293b;overflow:hidden;">
              <div style="height:100%;width:35%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#38bdf8,#6366f1);animation:editor-loader-slide 1.1s ease-in-out infinite;"></div>
            </div>
            <div style="margin-top:8px;color:#64748b;font:500 12px/1.3 Inter,sans-serif;">
              Monaco and runtime are downloading lazily...
            </div>
          </div>
        `;
        document.body.appendChild(el);
        loaderEl = el;
        return el;
      };

      const setLoaderVisible = (visible) => {
        const el = ensureLoader();
        el.style.display = visible ? "flex" : "none";
      };

      const ensureEditor = () => {
        if (!isEditorRoute()) {
          setLoaderVisible(false);
          return;
        }

        if (loaded) {
          setLoaderVisible(false);
          return;
        }

        if (!loadingPromise) {
          loaderTimer = window.setTimeout(() => setLoaderVisible(true), 120);
          loadingPromise = import("/src/VerdictEditor.ts")
            .then(() => {
              loaded = true;
            })
            .finally(() => {
              if (loaderTimer !== null) {
                window.clearTimeout(loaderTimer);
                loaderTimer = null;
              }
              setLoaderVisible(false);
            });
        }
      };

      // Style for loading animation (kept in JS so it ships only once with this loader logic).
      const loaderStyle = document.createElement("style");
      loaderStyle.textContent = `
        @keyframes editor-loader-slide {
          0% { transform: translateX(-140%); }
          100% { transform: translateX(360%); }
        }
      `;
      document.head.appendChild(loaderStyle);

      ensureEditor();
      // Catch client-side SPA navigations (ps-spa uses History pushState).
      window.addEventListener("popstate", ensureEditor);
      const _push = history.pushState;
      history.pushState = function (...args) {
        _push.apply(this, args);
        ensureEditor();
      };
      const _replace = history.replaceState;
      history.replaceState = function (...args) {
        _replace.apply(this, args);
        ensureEditor();
      };
    </script>
    <script defer src="/app.js"></script>
  </body>
</html>
